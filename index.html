<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Origin Trip Counts into Birkdale Village</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      text-align: center;
      padding: 8px 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #0e2d69;
    }

    .header .subtitle {
      margin-top: 2px;
      font-size: 13px;
      font-style: italic;
      color: #395a9a;
    }

    #map {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100dvh - 60px);
    }

    .source-note {
      position: fixed;
      bottom: 8px;
      left: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-style: italic;
    }

    .ritis-logo {
      position: fixed;
      bottom: 8px;
      right: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.85);
      padding: 3px 6px;
      border-radius: 4px;
    }

    .ritis-logo img {
      height: 36px;
      width: auto;
      display: block;
      opacity: 0.96;
    }

    .geo-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #24364b;
      font-size: 10px;
      font-weight: 700;
      padding: 0;
      text-shadow: 0 0 4px rgba(255,255,255,0.95);
      white-space: nowrap;
    }

    .value-label {
      background: rgba(255,255,255,0.88);
      border-radius: 10px;
      color: #111;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .birkdale-label {
      background: rgba(255,255,255,0.95);
      border: 1px solid #1f3b73;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 700;
      color: #1f3b73;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .legend-toggle {
      background: rgba(255,255,255,0.96);
      padding: 8px 10px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
      font-size: 13px;
      font-weight: 700;
      color: #1f3b73;
      cursor: pointer;
      user-select: none;
    }

    .legend-panel {
      background: rgba(255,255,255,0.96);
      padding: 10px 12px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
      font-size: 13px;
      line-height: 1.35;
      margin-top: 6px;
      display: none;
    }

    .legend-panel.open {
      display: block;
    }

    .legend-row {
      display: flex;
      align-items: center;
      margin: 4px 0;
      gap: 8px;
    }

    .legend-swatch {
      width: 18px;
      height: 18px;
      border: 1px solid #999;
      flex: 0 0 18px;
    }

    .leaflet-tooltip.geo-tooltip,
    .leaflet-tooltip.value-tooltip,
    .leaflet-tooltip.birkdale-label-tooltip {
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    .leaflet-tooltip.geo-tooltip:before,
    .leaflet-tooltip.value-tooltip:before,
    .leaflet-tooltip.birkdale-label-tooltip:before {
      display: none;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 16px;
      }

      .header .subtitle {
        font-size: 12px;
      }

      #map {
        top: 56px;
        height: calc(100dvh - 56px);
      }

      .geo-label {
        font-size: 9px;
      }

      .value-label {
        font-size: 10px;
        padding: 1px 5px;
      }

      .birkdale-label {
        font-size: 10px;
      }

      .ritis-logo img {
        height: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Origin Trip Counts into Birkdale Village</h1>
    <div class="subtitle">Study Period: January - February 2020</div>
  </div>

  <div id="map"></div>

  <div class="source-note">Source: INRIX trip data</div>

  <div class="ritis-logo">
    <img
      src="https://raw.githubusercontent.com/rayers-umd-edu/testing/54cdad1b295b0e88cbaba40401fba3b8f30e31a9/RITIS%20Powered%20by%20CATT%20Lab%20logo.png"
      alt="RITIS Powered by CATT Lab logo"
    />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const geojsonUrl = "https://raw.githubusercontent.com/rayers-umd-edu/Trips/main/Birkdale%20Village%20Study.geojson";

    // Approximate Birkdale Village location
    const birkdaleLat = 35.4429;
    const birkdaleLng = -80.8803;

    const map = L.map("map", { zoomControl: true });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let geojsonLayer;

    function getColor(d) {
      return d > 1100 ? "#084594" :
             d > 261  ? "#2171b5" :
             d > 73   ? "#4292c6" :
             d > 8    ? "#6baed6" :
                        "#c6dbef";
    }

    function style(feature) {
      return {
        fillColor: getColor(Number(feature.properties.origins || 0)),
        weight: 1,
        color: "#ffffff",
        fillOpacity: 0.82
      };
    }

    function numberWithCommas(x) {
      return Number(x || 0).toLocaleString();
    }

    function largestRingLatLngs(geometry) {
      let rings = [];
      if (geometry.type === "Polygon") {
        rings = [geometry.coordinates[0]];
      } else if (geometry.type === "MultiPolygon") {
        rings = geometry.coordinates.map(poly => poly[0]);
      } else {
        return null;
      }

      let best = null;
      let bestArea = -1;

      function ringArea(ring) {
        let area = 0;
        for (let i = 0; i < ring.length - 1; i++) {
          const x1 = ring[i][0], y1 = ring[i][1];
          const x2 = ring[i + 1][0], y2 = ring[i + 1][1];
          area += (x1 * y2 - x2 * y1);
        }
        return Math.abs(area / 2);
      }

      for (const ring of rings) {
        const a = ringArea(ring);
        if (a > bestArea) {
          bestArea = a;
          best = ring;
        }
      }

      if (!best) return null;
      return best.map(pt => [pt[1], pt[0]]);
    }

    function centerForFeature(feature) {
      const latlngs = largestRingLatLngs(feature.geometry);
      if (!latlngs) return null;
      try {
        return L.polygon(latlngs).getBounds().getCenter();
      } catch (e) {
        return null;
      }
    }

    function addLabels(feature) {
      const center = centerForFeature(feature);
      if (!center) return;

      const p = feature.properties || {};
      const zip = p.name || "Unknown";
      const county = p.county ? p.county.replace(" County", "") : "";
      const geoText = county ? (zip + " / " + county) : zip;
      const valueText = numberWithCommas(p.origins || 0);

      L.tooltip({
        permanent: true,
        direction: "top",
        className: "geo-tooltip",
        offset: [0, -10]
      })
      .setLatLng(center)
      .setContent('<div class="geo-label">' + geoText + '</div>')
      .addTo(map);

      L.tooltip({
        permanent: true,
        direction: "bottom",
        className: "value-tooltip",
        offset: [0, 10]
      })
      .setLatLng(center)
      .setContent('<div class="value-label">' + valueText + '</div>')
      .addTo(map);
    }

    function addBirkdaleMarker() {
      const marker = L.circleMarker([birkdaleLat, birkdaleLng], {
        radius: 7,
        color: "#1f3b73",
        weight: 2,
        fillColor: "#f4c542",
        fillOpacity: 1
      }).addTo(map);

      marker.bindPopup("<strong>Birkdale Village</strong>");

      L.tooltip({
        permanent: true,
        direction: "right",
        className: "birkdale-label-tooltip",
        offset: [10, 0]
      })
      .setLatLng([birkdaleLat, birkdaleLng])
      .setContent('<div class="birkdale-label">Birkdale Village</div>')
      .addTo(map);
    }

    function addLegend() {
      const legend = L.control({ position: "topright" });

      legend.onAdd = function() {
        const div = L.DomUtil.create("div");
        div.innerHTML = `
          <div class="legend-toggle" id="legendToggle">Show Legend</div>
          <div class="legend-panel" id="legendPanel">
            <strong>Origin Trips</strong><br>
            <span style="font-style:italic">Quantile classification</span>
            <div class="legend-row"><span class="legend-swatch" style="background:#c6dbef"></span><span>1 - 8</span></div>
            <div class="legend-row"><span class="legend-swatch" style="background:#6baed6"></span><span>9 - 73</span></div>
            <div class="legend-row"><span class="legend-swatch" style="background:#4292c6"></span><span>74 - 261</span></div>
            <div class="legend-row"><span class="legend-swatch" style="background:#2171b5"></span><span>262 - 1,100</span></div>
            <div class="legend-row"><span class="legend-swatch" style="background:#084594"></span><span>1,101 - 1,523</span></div>
          </div>
        `;
        L.DomEvent.disableClickPropagation(div);
        return div;
      };

      legend.addTo(map);

      setTimeout(() => {
        const toggle = document.getElementById("legendToggle");
        const panel = document.getElementById("legendPanel");

        if (toggle && panel) {
          toggle.addEventListener("click", function() {
            const isOpen = panel.classList.contains("open");
            if (isOpen) {
              panel.classList.remove("open");
              toggle.textContent = "Show Legend";
            } else {
              panel.classList.add("open");
              toggle.textContent = "Hide Legend";
            }
          });
        }
      }, 0);
    }

    function onEachFeature(feature, layer) {
      const p = feature.properties || {};
      const geo = p.name || "Unknown";
      const county = p.county || "";
      const trips = p.origins || 0;

      layer.bindPopup(
        "<strong>" + geo + "</strong><br>" +
        (county ? county + "<br>" : "") +
        "Origin trips: " + numberWithCommas(trips)
      );

      layer.on({
        mouseover: function(e) {
          const l = e.target;
          l.setStyle({
            weight: 2,
            color: "#173b73",
            fillOpacity: 0.95
          });
          if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
            l.bringToFront();
          }
        },
        mouseout: function(e) {
          geojsonLayer.resetStyle(e.target);
        }
      });

      addLabels(feature);
    }

    fetch(geojsonUrl)
      .then(r => {
        if (!r.ok) throw new Error("GeoJSON failed to load: " + r.status);
        return r.json();
      })
      .then(data => {
        geojsonLayer = L.geoJSON(data, {
          style,
          onEachFeature
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });

        addBirkdaleMarker();
        addLegend();

        setTimeout(() => map.invalidateSize(), 200);
      })
      .catch(err => {
        console.error(err);
        alert("Could not load the map data. Check the GeoJSON URL and browser console.");
      });
  </script>
</body>
</html>
