<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Origin Trip Counts into Birkdale Village</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      text-align: center;
      padding: 8px 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #0e2d69;
    }

    .header .subtitle {
      margin-top: 2px;
      font-size: 13px;
      font-style: italic;
      color: #395a9a;
    }

    #map {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100dvh - 60px);
    }

    .source-note {
      position: fixed;
      bottom: 8px;
      left: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-style: italic;
    }

    .ritis-logo {
      position: fixed;
      bottom: 8px;
      right: 10px;
      z-index: 1000;
    }

    .ritis-logo img {
      height: 40px;
      width: auto;
      opacity: 0.95;
    }

    .geo-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #24364b;
      font-size: 10px;
      font-weight: 700;
      padding: 0;
      text-shadow: 0 0 4px rgba(255,255,255,0.95);
      white-space: nowrap;
    }

    .value-label {
      background: rgba(255,255,255,0.88);
      border-radius: 10px;
      color: #111;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    .leaflet-tooltip {
      background: transparent;
      border: none;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Origin Trip Counts into Birkdale Village</h1>
    <div class="subtitle">Study Period: January - February 2020</div>
  </div>

  <div id="map"></div>

  <div class="source-note">Source: INRIX trip data</div>

  <div class="ritis-logo">
    <img src="https://raw.githubusercontent.com/rayers-umd-edu/testing/54cdad1b295b0e88cbaba40401fba3b8f30e31a9/RITIS%20Powered%20by%20CATT%20Lab%20logo.png">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const geojsonUrl = "https://raw.githubusercontent.com/rayers-umd-edu/Trips/main/Birkdale%20Village%20Study.geojson";

    const map = L.map("map");
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    function getColor(d) {
      return d > 1100 ? "#084594" :
             d > 261  ? "#2171b5" :
             d > 73   ? "#4292c6" :
             d > 8    ? "#6baed6" :
                        "#c6dbef";
    }

    function style(feature) {
      return {
        fillColor: getColor(feature.properties.origins || 0),
        weight: 1,
        color: "#fff",
        fillOpacity: 0.8
      };
    }

    function center(feature) {
      const coords = feature.geometry.coordinates[0];
      let lat = 0, lng = 0;
      coords.forEach(c => {
        lng += c[0];
        lat += c[1];
      });
      return [lat / coords.length, lng / coords.length];
    }

    function addLabels(feature) {
      const c = center(feature);
      const p = feature.properties;

      L.tooltip({permanent:true, direction:"top"})
        .setLatLng(c)
        .setContent(`<div class="geo-label">${p.name}</div>`)
        .addTo(map);

      L.tooltip({permanent:true, direction:"bottom"})
        .setLatLng(c)
        .setContent(`<div class="value-label">${(p.origins||0).toLocaleString()}</div>`)
        .addTo(map);
    }

    fetch(geojsonUrl)
      .then(r => r.json())
      .then(data => {
        const layer = L.geoJSON(data, {
          style,
          onEachFeature: (f,l) => {
            l.bindPopup(`${f.properties.name}<br>Trips: ${(f.properties.origins||0).toLocaleString()}`);
            addLabels(f);
          }
        }).addTo(map);

        map.fitBounds(layer.getBounds());
      });
  </script>

</body>
</html>
